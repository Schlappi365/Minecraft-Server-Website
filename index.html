<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minecraft Server</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial;
}

body{
  color:white;
  overflow-x:hidden;
}

/* 🎥 VIDEO BACKGROUND */
video{
  position:fixed;
  right:0;
  bottom:0;
  min-width:100%;
  min-height:100%;
  z-index:-3;
  object-fit:cover;
  filter:brightness(0.35) blur(1px);
}

/* DARK OVERLAY */
.overlay{
  position:fixed;
  width:100%;
  height:100%;
  background:radial-gradient(circle, rgba(0,0,0,0.3), rgba(0,0,0,0.85));
  z-index:-2;
}

/* NAV */
nav{
  display:flex;
  justify-content:space-between;
  padding:15px 25px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(10px);
  position:sticky;
  top:0;
  z-index:10;
}

nav a{
  margin:0 10px;
  cursor:pointer;
  color:white;
  opacity:0.7;
}

nav a:hover{
  opacity:1;
  color:#4ade80;
}

/* HERO */
.hero{
  text-align:center;
  padding:90px 20px;
}

h1{
  font-size:55px;
  color:#4ade80;
  text-shadow:0 0 20px #4ade80;
}

/* IP BOX */
.ip{
  display:inline-block;
  margin-top:20px;
  padding:12px 18px;
  background:rgba(255,255,255,0.08);
  border-radius:12px;
  cursor:pointer;
  transition:0.3s;
}

.ip:hover{
  transform:scale(1.05);
  box-shadow:0 0 20px #4ade80;
}

/* STATUS BOX */
.status{
  margin-top:25px;
  display:inline-block;
  padding:15px 20px;
  background:rgba(255,255,255,0.08);
  border-radius:12px;
  backdrop-filter:blur(10px);
}

.online{
  color:#4ade80;
  font-weight:bold;
}

.offline{
  color:#ff4d4d;
  font-weight:bold;
}

/* CARDS */
.container{
  max-width:900px;
  margin:auto;
  padding:20px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

.card{
  background:rgba(255,255,255,0.06);
  padding:20px;
  border-radius:15px;
  backdrop-filter:blur(10px);
}

</style>
</head>

<body>

<!-- 🎥 VIDEO (ersetzen!) -->
<video autoplay muted loop>
  <source src="https://cdn.coverr.co/videos/coverr-minecraft-style-landscape-1579/1080p.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<nav>
  <div><b>⛏ MC SERVER</b></div>
  <div>
    <a onclick="show('home')">Home</a>
    <a onclick="show('rules')">Regeln</a>
  </div>
</nav>

<!-- HOME -->
<div id="home">
  <div class="hero">
    <h1>⛏ Minecraft Server</h1>
    <p>Der beste Server für dein Abenteuer</p>

    <div class="ip" onclick="copyIP()">
      📡 IP: <span id="ip">dein.server.ip</span>
    </div>

    <!-- LIVE STATUS -->
    <div class="status" id="statusBox">
      Status: <span id="status">Lade...</span><br>
      Spieler: <span id="players">?</span>
    </div>
  </div>
</div>

<!-- RULES -->
<div id="rules" style="display:none">
  <div class="hero">
    <h1>📜 Regeln</h1>
  </div>

  <div class="container">
    <div class="card">❌ Kein Cheating</div>
    <div class="card">❌ Kein Griefing</div>
    <div class="card">❌ Kein Spam</div>
    <div class="card">✔ Respekt</div>
  </div>
</div>

<script>
// PAGE SWITCH
function show(page){
  document.getElementById("home").style.display = page==="home"?"block":"none";
  document.getElementById("rules").style.display = page==="rules"?"block":"none";
}

// COPY IP
function copyIP(){
  const ip = document.getElementById("ip").innerText;
  navigator.clipboard.writeText(ip);
  alert("IP kopiert: " + ip);
}

// 🌐 LIVE MINECRAFT SERVER STATUS
const serverIP = "dein.server.ip"; // HIER EINTRAGEN

async function loadStatus(){
  try{
    const res = await fetch(`https://api.mcsrvstat.us/2/${serverIP}`);
    const data = await res.json();

    if(data.online){
      document.getElementById("status").innerHTML = "ONLINE";
      document.getElementById("status").className = "online";
      document.getElementById("players").innerHTML =
        data.players.online + " / " + data.players.max;
    } else {
      document.getElementById("status").innerHTML = "OFFLINE";
      document.getElementById("status").className = "offline";
      document.getElementById("players").innerHTML = "0";
    }

  } catch(e){
    document.getElementById("status").innerHTML = "Fehler";
  }
}

loadStatus();
setInterval(loadStatus, 10000);
</script>

</body>
</html>
